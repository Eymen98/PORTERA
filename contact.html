<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>İletişim | PORTERA</title>
    <link rel="icon" type="image/icon"  href="images/icon.ico">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-[var(--BODY)] text-[var(--TEXT)]">

    <!-- Navbar -->
    <header class="sticky top-0 z-50 bg-[var(--NAVBAR)] backdrop-blur border-b border-[var(--TEXT)]/30">
        <div class="max-w-7xl 2xl:max-w-[1800px] mx-auto flex items-center justify-between px-6">
            <a href="index.html">
                <img src="images/logo1.png" class="h-[70px] md:h-[80px] w-auto object-contain">
            </a>

            <div class="hidden md:flex items-center gap-3">
                <nav class="flex items-center gap-3 text-sm">
                    <a href="index.html" data-i18n="nav_home" class="nav-link">ANASAYFA</a>
                    <a href="index.html#hizmelter" data-i18n="nav_services" class="nav-link">HİZMETLER</a>
                    <a href="index.html#hakkında" data-i18n="nav_about" class="nav-link">HAKKINDA</a>
                    <a href="contact.html" data-i18n="nav_contact" class="nav-link active">İLETİŞİM</a>
                </nav>

                <!-- Desktop Language Switch -->
                <div class="relative">
                    <button id="langToggleDesktop" type="button"
                        class="lang-toggle flex items-center justify-center gap-2 h-10 px-3 rounded-md border border-white/20  text-white backdrop-blur-md transition-all duration-300">
                        <i class="fa-solid iconn fa-globe text-sm"></i>
                        <!-- <i class="fa-solid fa-chevron-down text-[11px]"></i> -->
                    </button>

                    <div id="langMenuDesktop"
                        class="lang-menu hidden absolute right-0 mt-2 w-44 bg-white rounded-md shadow-xl overflow-hidden border border-black/10 z-50">
                        <button type="button" onclick="setLang('tr')" class="lang-item">
                            <span class="text-lg">🇹🇷</span>
                            <span>Türkçe</span>
                        </button>
                        
                        <button type="button" onclick="setLang('en')" class="lang-item">
                            <span class="text-lg">🇺🇸</span>
                            <span>English</span>
                        </button>

                        <button type="button" onclick="setLang('ar')" class="lang-item">
                            <span class="text-lg">🇸🇦</span>
                            <span>العربية</span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Mobile Actions -->
            <div class="flex items-center gap-2 md:hidden">
                <!-- Mobile Language Switch -->
                <div class="relative">
                    <button id="langToggleMobile" type="button"
                        class="lang-toggle flex items-center justify-center gap-2 h-10 px-3 rounded-md border border-white/20  text-white backdrop-blur-md transition-all duration-300">
                        <i class="fa-solid iconn fa-globe text-sm"></i>
                        <!-- <i class="fa-solid fa-chevron-down text-[11px]"></i> -->
                    </button>

                    <div id="langMenuMobile"
                        class="lang-menu hidden absolute right-0 mt-2 w-44 bg-white rounded-md shadow-xl overflow-hidden border border-black/10 z-50">
                        <button type="button" onclick="setLang('tr')" class="lang-item">
                            <span class="text-lg">🇹🇷</span>
                            <span>Türkçe</span>
                        </button>
                                                
                        <button type="button" onclick="setLang('en')" class="lang-item">
                            <span class="text-lg">🇺🇸</span>
                            <span>English</span>
                        </button>

                        <button type="button" onclick="setLang('ar')" class="lang-item">
                            <span class="text-lg">🇸🇦</span>
                            <span>العربية</span>
                        </button>
                    </div>
                </div>

                <!-- Mobile Toggle -->
                <button id="navToggle" class="border border-[var(--TEXT)] bg-[var(--BODY)] rounded-full px-4 py-2">
                    ☰
                </button>
            </div>
        </div>

        <!-- Mobile Menu -->
        <div id="mobileMenu"
            class="hidden md:hidden border-t border-[var(--cream)]/30 bg-[var(--NAVBAR)]/90 backdrop-blur">
            <nav class="flex flex-col px-6 py-4 gap-4">
                <a onclick="toggleMenu()" href="index.html" data-i18n="nav_home" class="nav-link">ANASAYFA</a>
                <a onclick="toggleMenu()" href="index.html#hizmelter" data-i18n="nav_services"
                    class="nav-link">HİZMETLER</a>
                <a onclick="toggleMenu()" href="index.html#hakkında" data-i18n="nav_about" class="nav-link">HAKKINDA</a>
                <a onclick="toggleMenu()" href="contact.html" data-i18n="nav_contact"
                    class="nav-link active">İLETİŞİM</a>
            </nav>
        </div>
    </header>

    <!-- Contact Section -->
    <section class="max-w-6xl mx-auto px-6 py-20">
        <h1 data-i18n="contact_title" class="text-4xl md:text-5xl font-serif mb-5 text-center">
            İletişim
        </h1>

        <div class="grid md:grid-cols-2 gap-16 items-start">
            <!-- Contact Info -->
            <div class="space-y-6">

                <div class="contact-info-card bg-white/10 backdrop-blur rounded-2xl p-8 shadow-xl space-y-6">

                    <h2 data-i18n="contact_company" class="text-2xl font-semibold mb-4">
                        PORTERA
                    </h2>

                    <!-- Phone -->
                    <div class="flex items-center gap-3">
                        <i class="fa-solid fa-phone text-xl"></i>
                        <span>(+90) 543 413 02 35</span>
                    </div>

                    <!-- Email -->
                    <div class="flex items-center gap-3">
                        <i class="fa-solid fa-envelope text-xl"></i>
                        <span>support@porteradis.com</span>
                    </div>

                    <div class="flex items-center gap-3">
                        <i class="fa-solid fa-envelope text-xl"></i>
                        <span>suphibayrak@gmail.com</span>
                    </div>

                    <!-- Address -->
                    <div class="flex items-start gap-3">
                        <i class="fa-solid fa-location-dot text-xl mt-1"></i>
                        <div>
                            <p>KONAK MAH. BEŞEVLER CAD.</p>
                            <p>KARAKOC APT BLOK NO: 36 İÇ KAPI NO: 3</p>
                            <p>NİLÜFER / BURSA</p>
                        </div>
                    </div>

                </div>

                <!-- Contact Buttons -->
                <div class="flex flex-col sm:flex-row gap-4">

                    <a href="https://wa.me/905434130235" data-i18n="btn_whatsapp"
                        class="flex items-center justify-center gap-2 px-6 py-3 bg-green-500 text-white rounded-full hover:bg-green-600 transition">
                        <i class="fa-brands fa-whatsapp"></i>
                        WhatsApp
                    </a>

                    <a href="mailto:support@porteradis.com" data-i18n="btn_email"
                        class="flex items-center justify-center gap-2 px-6 py-3 bg-blue-600 text-white rounded-full hover:bg-blue-700 transition">
                        <i class="fa-solid fa-paper-plane"></i>
                        Send Email
                    </a>

                    <a href="tel:+905434130235" data-i18n="btn_call"
                        class="flex items-center justify-center gap-2 px-6 py-3 border border-white rounded-full hover:bg-white hover:text-black transition">
                        <i class="fa-solid fa-phone"></i>
                        Call
                    </a>

                </div>

            </div>

            <!-- Map -->
            <div class="rounded-2xl overflow-hidden shadow-2xl border border-white/20">

                <iframe
                    src="https://maps.google.com/maps?q=KONAK%20MAH.%20BEŞEVLER%20CAD.%20KARAKOC%20APT%20BLOK%20NO%2036%20İÇ%20KAPI%20NO%203%20NİLÜFER%20BURSA&z=17&output=embed"
                    class="w-full h-[450px] border-0">
                </iframe>

            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>

</html>
